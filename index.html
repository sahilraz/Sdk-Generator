<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Api SDK Generator</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JSZip & FileSaver -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #0f172a;
            overflow-x: hidden;
        }
        
        /* Modern scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Glassmorphism panel */
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        /* Glowing input */
        .input-glowing:focus {
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            border-color: rgba(168, 85, 247, 0.8);
        }
        
        /* Animation delays for blobs */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center relative font-sans antialiased">
    
    <!-- Background Animated Blobs -->
    <div class="fixed inset-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[128px] opacity-40 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-screen filter blur-[128px] opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[30rem] h-[30rem] bg-blue-600 rounded-full mix-blend-screen filter blur-[128px] opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Main Card Container -->
    <div class="relative z-10 w-full max-w-lg p-5 sm:p-8 mx-auto">
        
        <div class="glass-panel rounded-[2rem] p-8 sm:p-12 transform transition-all duration-500 hover:shadow-[0_25px_60px_-12px_rgba(0,0,0,0.9)]">
            
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-tr from-purple-500 to-cyan-400 shadow-[0_0_30px_rgba(168,85,247,0.5)] mb-8 transform hover:scale-110 hover:rotate-6 transition duration-300">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight mb-4 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-cyan-400 to-blue-500 drop-shadow-sm">
                    Quantum SDK
                </h1>
                <p class="text-slate-400 text-sm sm:text-base font-light tracking-wide leading-relaxed">
                    Enter API key to securely build and download personalized SDK package.
                </p>
            </div>

            <!-- Form -->
            <form id="generatorForm" class="space-y-8">
                <!-- Dropdown -->
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-purple-500 to-cyan-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-500"></div>
                    <div class="relative">
                        <label for="sdkType" class="sr-only">Select SDK</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400 group-focus-within:text-purple-400 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                            </svg>
                        </div>
                        <select id="sdkType" class="input-glowing appearance-none block w-full pl-12 pr-10 py-4 sm:py-5 bg-slate-900/80 border border-slate-600/50 rounded-2xl text-white focus:outline-none transition-all duration-300 font-medium tracking-wide text-base sm:text-lg cursor-pointer">
                            <option value="same-trend">Same Trend SDK</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-purple-500 to-cyan-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-500"></div>
                    <div class="relative">
                        <label for="apiKey" class="sr-only">API Key</label>
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400 group-focus-within:text-purple-400 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                            </svg>
                        </div>
                        <input type="text" id="apiKey" required placeholder="Enter your API Key (e.g. qk_live_...)" 
                            class="input-glowing block w-full pl-12 pr-4 py-4 sm:py-5 bg-slate-900/80 border border-slate-600/50 rounded-2xl text-white placeholder-slate-500 focus:outline-none transition-all duration-300 font-medium tracking-wide text-base sm:text-lg">
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="group relative w-full flex justify-center items-center py-4 sm:py-5 px-4 border border-transparent rounded-2xl shadow-lg text-base sm:text-lg font-bold text-white bg-gradient-to-r from-purple-600 to-cyan-600 hover:from-purple-500 hover:to-cyan-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 focus:ring-offset-slate-900 overflow-hidden transform transition-all hover:-translate-y-1 hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] active:scale-95 active:translate-y-0">
                    <div class="absolute inset-0 w-full h-full bg-white/20 scale-x-0 group-hover:scale-x-100 transform origin-left transition-transform duration-300 ease-out"></div>
                    <span class="relative flex items-center gap-3">
                        Build & Download ZIP
                        <svg class="w-5 h-5 sm:w-6 sm:h-6 group-hover:translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Progress Area -->
            <div id="statusArea" class="mt-10 hidden animate-fade-in">
                <div class="flex justify-between items-end mb-3 gap-4 overflow-hidden">
                    <span id="statusText" class="text-xs sm:text-sm font-bold text-cyan-400 uppercase tracking-widest animate-pulse truncate flex-1">Processing...</span>
                    <span id="statusPercent" class="text-xs sm:text-sm font-extrabold text-white flex-shrink-0">0%</span>
                </div>
                <div class="w-full bg-slate-900/80 rounded-full h-3 overflow-hidden border border-slate-700/50 shadow-inner">
                    <div id="progressBar" class="bg-gradient-to-r from-purple-500 via-cyan-500 to-blue-500 h-full rounded-full transition-all duration-300 ease-out shadow-[0_0_15px_rgba(6,182,212,0.8)]" style="width: 0%"></div>
                </div>
            </div>
            
            <!-- Error Area -->
            <div id="errorArea" class="mt-8 hidden overflow-hidden rounded-2xl bg-red-500/10 border border-red-500/30 backdrop-blur-md animate-fade-in">
                <div class="p-5 flex items-start space-x-4">
                    <svg class="h-6 w-6 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <p id="errorText" class="text-sm sm:text-base text-red-200 font-medium leading-relaxed"></p>
                </div>
            </div>

        </div>
        <!-- Footer -->
        <div class="mt-10 text-center space-y-4">
            <div class="inline-block glass-panel px-6 py-3 rounded-full border border-slate-700/50 hover:border-cyan-500/50 transition-colors duration-300">
                <p class="text-slate-300 text-sm font-medium">
                    Don't have an API Key? 
                    <a href="https://t.me/ImJust_Joking" target="_blank" rel="noopener noreferrer" class="text-cyan-400 hover:text-cyan-300 hover:shadow-[0_0_10px_rgba(34,211,238,0.5)] transition-all duration-300 font-bold ml-1">
                        Contact Owner
                    </a>
                </p>
            </div>
            
            <div class="flex flex-col items-center justify-center space-y-1.5 opacity-60 hover:opacity-100 transition-opacity duration-300 pt-4">
                <p class="text-slate-400 text-xs sm:text-sm tracking-[0.2em] uppercase font-bold">
                    Created by <span class="text-purple-400">Devil Boy</span>
                </p>
                <p class="text-slate-600 text-[10px] sm:text-xs tracking-[0.3em] uppercase font-bold">
                    Powered by Quantum Engine
                </p>
            </div>
        </div>
    </div>

    <!-- Generator Logic Script -->
    <script>
        const sdkTemplates = {
            "same-trend": {
                folder: "Same Trend",
                zipName: "Same Trend (By QuantumApi).zip",
                files: [
                    'Same Trend/nayakaphalitansa_mulaka_unohs.php',
                    'Same Trend/nayakaphalitansa_mulaka_unohs_drei.php',
                    'Same Trend/nayakaphalitansa_mulaka_unohs_funf.php',
                    'Same Trend/nayakaphalitansa_mulaka_unohs_zehn.php',
                    'Same Trend/quantum-connect.php'
                ],
                keyFile: "quantum-connect.php"
            }
        };

        document.getElementById('generatorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const apiKey = document.getElementById('apiKey').value.trim();
            const sdkKey = document.getElementById('sdkType').value;
            const activeTemplate = sdkTemplates[sdkKey];
            
            if (!apiKey || !activeTemplate) return;
            if (activeTemplate.files.length === 0) {
                document.getElementById('errorText').textContent = "This SDK is currently under construction.";
                document.getElementById('errorArea').classList.remove('hidden');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const statusArea = document.getElementById('statusArea');
            const errorArea = document.getElementById('errorArea');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const statusPercent = document.getElementById('statusPercent');

            // Reset UI State
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed', 'scale-95');
            statusArea.classList.remove('hidden');
            errorArea.classList.add('hidden');
            progressBar.style.width = '0%';
            statusPercent.textContent = '0%';
            
            try {
                statusText.textContent = `Verifying API Key...`;
                
                // IMPORTANT: Replace this with the actual URL where your api.js is deployed
                const API_BASE_URL = "https://quantum-api.ajibcomedy.workers.dev"; 
                
                try {
                    const verifyRes = await fetch(`${API_BASE_URL}/verify?api_key=${apiKey}`);
                    const verifyData = await verifyRes.json();
                    
                    if (!verifyRes.ok || verifyData.code !== 200) {
                        throw new Error(verifyData.msg || "Invalid API Key");
                    }
                } catch (fetchErr) {
                    throw new Error(fetchErr.message || "Failed to connect to verification API.");
                }

                const zip = new JSZip();
                const folder = zip.folder(activeTemplate.folder);
                let quantumConnectFound = false;

                for (let i = 0; i < activeTemplate.files.length; i++) {
                    const filePath = activeTemplate.files[i];
                    const fileName = filePath.split('/').pop();
                    
                    statusText.textContent = `Injecting ${fileName}...`;
                    const percent = Math.round((i / activeTemplate.files.length) * 100);
                    progressBar.style.width = `${percent}%`;
                    statusPercent.textContent = `${percent}%`;
                    
                    const response = await fetch(filePath);
                    if (!response.ok) {
                        throw new Error(`Failed to locate ${fileName} (HTTP ${response.status}). Is the template folder correctly deployed?`);
                    }
                    
                    let content = await response.text();
                    
                    if (fileName === 'quantum-connect.php') {
                        quantumConnectFound = true;
                        statusText.textContent = `Authenticating SDK...`;
                        
                        const regex = /(\$api_key\s*=\s*")([^"]+)(";)/;
                        if (regex.test(content)) {
                            content = content.replace(regex, `$1${apiKey}$3`);
                        } else {
                            throw new Error("Could not map API Key hook in quantum-connect.php. Code structure may have been altered.");
                        }
                    }
                    
                    folder.file(fileName, content);
                    
                    // Artificial visual delay for premium feedback
                    await new Promise(resolve => setTimeout(resolve, 300));
                }

                if (!quantumConnectFound) throw new Error("Critical Core File missing from template repository.");

                statusText.textContent = `Compiling Package...`;
                progressBar.style.width = `95%`;
                statusPercent.textContent = `95%`;
                
                const zipBlob = await zip.generateAsync({ type: "blob" });
                
                progressBar.style.width = `100%`;
                statusPercent.textContent = `100%`;
                statusText.textContent = `Download Triggered!`;
                
                saveAs(zipBlob, activeTemplate.zipName);
                
                // Cleanup UI after success
                setTimeout(() => {
                    statusArea.classList.add('hidden');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'scale-95');
                    document.getElementById('apiKey').value = ''; 
                }, 2500);

            } catch (error) {
                console.error(error);
                document.getElementById('errorText').textContent = error.message || "An unexpected system fault occurred.";
                errorArea.classList.remove('hidden');
                statusArea.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'scale-95');
            }
        });
    </script>
</body>
</html>
